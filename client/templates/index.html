<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadMe — платформа курсов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header class="header">
        <div class="container-fluid container-xl d-flex flex-wrap align-items-center justify-content-between py-3">
            <div class="logo">ReadMe</div>
            <div class="search-box position-relative">
                <input type="text" placeholder="Поиск:" id="searchInput">
                <span class="search-icon">🔍</span>
            </div>
            <div class="header-buttons d-flex gap-3">
                <button class="theme-toggle" id="themeToggle">
                    <span id="themeIcon">🌙</span>
                    <span id="themeText">Тьма</span>
                </button>
                <button class="btn-login" id="loginBtn">Вход</button>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container-xl">
            <div class="section-header d-flex justify-content-between align-items-center flex-wrap">
                <h1 class="section-title">Курсы</h1>
                <button class="filters-btn" id="filtersBtn">Фильтры</button>
            </div>

            <div class="courses-grid row g-4 row-cols-1 row-cols-md-2 row-cols-lg-4 mb-5" id="coursesGrid">
                <div class="col">
                    <div class="course-card">
                        <div class="course-number">Курс 1</div>
                        <div class="course-line"></div>
                        <div class="course-line"></div>
                        <div class="course-line"></div>
                    </div>
                </div>
                <div class="col">
                    <div class="course-card">
                        <div class="course-number">Курс 2</div>
                        <div class="course-line"></div>
                        <div class="course-line"></div>
                        <div class="course-line"></div>
                    </div>
                </div>
                <div class="col">
                    <div class="course-card">
                        <div class="course-number">Курс 3</div>
                        <div class="course-line"></div>
                        <div class="course-line"></div>
                        <div class="course-line"></div>
                    </div>
                </div>
                <div class="col">
                    <div class="course-card">
                        <div class="course-number">Курс 4</div>
                        <div class="course-line"></div>
                        <div class="course-line"></div>
                        <div class="course-line"></div>
                    </div>
                </div>
                <div class="col">
                    <div class="course-card">
                        <div class="course-number">Курс 5</div>
                        <div class="course-line"></div>
                        <div class="course-line"></div>
                        <div class="course-line"></div>
                    </div>
                </div>
                <div class="col">
                    <div class="course-card">
                        <div class="course-number">Курс 6</div>
                        <div class="course-line"></div>
                        <div class="course-line"></div>
                        <div class="course-line"></div>
                    </div>
                </div>
            </div>

            <div class="pagination d-flex justify-content-center gap-3 flex-wrap">
                <button class="pagination-btn" id="prevPageBtn">
                    <span>←</span> Предыдущий
                </button>
                <button class="pagination-btn" id="nextPageBtn">
                    Следующий <span>→</span>
                </button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container-xl">
            <div class="footer-content row text-center text-md-start">
                <div class="col-md-6 mb-4 mb-md-0">
                    <h4>ReadMe</h4>
                    <a href="#">Иконки</a>
                </div>
                <div class="col-md-6">
                    <h4>О Нас</h4>
                    <a href="#">Контактная Инфо</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="authModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modalTitle">Вход</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="authForm">
                    <!-- Поля для входа -->
                    <div id="loginFields">
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Никнейм" id="loginNickname">
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" placeholder="Пароль" id="loginPassword">
                        </div>
                    </div>
                    <!-- Поля для регистрации (скрыты) -->
                    <div id="regFields" style="display: none;">
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Никнейм" id="regNickname">
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" placeholder="Email" id="regEmail">
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" placeholder="Пароль" id="regPassword">
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" placeholder="Подтвердите пароль" id="regConfirm">
                        </div>
                    </div>

                    <div class="d-flex gap-2 mb-3">
                        <button type="button" class="btn btn-outline-secondary flex-fill" id="showLoginBtn">Вход</button>
                        <button type="button" class="btn btn-outline-secondary flex-fill" id="showRegBtn">Регистрация</button>
                    </div>
                    <button type="submit" class="btn-login w-100" id="submitBtn">Войти</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
