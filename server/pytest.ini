[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --cov=service
    --cov-config=.coveragerc
    --cov-report=term-missing
    --cov-report=html:tests/coverage_html

markers =
    unit: Unit tests
    integration: Integration tests