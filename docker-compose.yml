services:
    postgres-db:
        image: postgres:18.3-alpine3.23
        container_name: readme_postgres_db
        command:
            - "postgres"
            - "-c"
            - "max_connections=50"
            - "-c"
            - "shared_buffers=1GB"
            - "-c"
            - "effective_cache_size=4GB"
            - "-c"
            - "work_mem=16MB"
            - "-c"
            - "maintenance_work_mem=512MB"
            - "-c"
            - "random_page_cost=1.1"
            - "-c"
            - "temp_file_limit=5GB"
            - "-c"
            - "log_min_duration_statement=200ms"
            - "-c"
            - "idle_in_transaction_session_timeout=10s"
            - "-c"
            - "lock_timeout=1s"
            - "-c"
            - "statement_timeout=60s"
            - "-c"
            - "shared_preload_libraries=pg_stat_statements"
            - "-c"
            - "pg_stat_statements.max=10000"
            - "-c"
            - "pg_stat_statements.track=all"
        environment:
            POSTGRES_DB: "readmedb"
            POSTGRES_USER: "readmepguser"
            POSTGRES_PASSWORD: "pgpwd4readme"
            PGDATA: "/var/lib/postgresql/data/pgdata"
        volumes:
            - readme-pgdb-data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        networks:
            - readme-network
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U readmepguser -d readmedb" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 4G

    postgres-backups:
        image: prodrigestivill/postgres-backup-local:18-alpine-d257e5d
        container_name: readme_postgres_backups
        restart: always
        environment:
            - POSTGRES_HOST=postgres-db
            - POSTGRES_DB=readmedb
            - POSTGRES_USER=readmepguser
            - POSTGRES_PASSWORD=pgpwd4readme
            - SCHEDULE=@every 12h00m00s
            - BACKUP_KEEP_DAYS=7
        volumes:
            - readme-pgdb-backups:/backups
        networks:
            - readme-network
        depends_on:
            postgres-db:
                condition: service_healthy

    client:
        build:
            context: ./client
            dockerfile: Dockerfile
        container_name: readme_client
        networks:
            - readme-network
        depends_on:
            postgres-db:
                condition: service_healthy
        ports:
            - "8000:8000"
        restart: unless-stopped

    server:
        build:
            context: ./server
            dockerfile: Dockerfile
        container_name: readme_server
        networks:
            - readme-network
        depends_on:
            postgres-db:
                condition: service_healthy
        ports:
            -   "8080:8080"
        restart: unless-stopped

networks:
    readme-network:
        driver: bridge

volumes:
    readme-pgdb-data:
    readme-pgdb-backups:

